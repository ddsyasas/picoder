# Picoder 0.1 default config ("pico").
# Small enough for a CPU smoke test, comfortable on any GPU.
# vocab_size is left null here; the tokenizer sets it at build time.

# --- model ---
vocab_size: null
block_size: 128
n_layer: 4
n_head: 4
n_embd: 128
dropout: 0.1
tie_weights: true

# --- data ---
dataset: tinyshakespeare
data_dir: data
val_fraction: 0.1

# --- training ---
batch_size: 32
max_steps: 5000
learning_rate: 0.0003
weight_decay: 0.1
beta1: 0.9
beta2: 0.99
grad_clip: 1.0
warmup_steps: 100
lr_decay: true
min_lr: 0.00003
eval_interval: 250
eval_iters: 200
log_interval: 50

# --- bookkeeping ---
seed: 1337
device: auto
dtype: float32
out_dir: checkpoints/pico
run_name: pico
