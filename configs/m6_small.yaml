# M6 scaling sweep: SMALL config.
# Varies only n_layer and n_embd from pico; everything else identical.
vocab_size: null
block_size: 128
n_layer: 3
n_head: 4
n_embd: 96
dropout: 0.1
tie_weights: true

dataset: tinyshakespeare
data_dir: data
val_fraction: 0.1

batch_size: 32
max_steps: 3000
learning_rate: 0.0003
weight_decay: 0.1
beta1: 0.9
beta2: 0.99
grad_clip: 1.0
warmup_steps: 100
lr_decay: true
min_lr: 0.00003
eval_interval: 500
eval_iters: 100
log_interval: 100

seed: 1337
device: auto
dtype: float32
out_dir: checkpoints/m6/small
run_name: m6_small
